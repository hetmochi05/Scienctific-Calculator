<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All-in-One Calculator</title>

    <!-- CSS (order matters: colors first, then base, then responsive overrides last) -->
    <link rel="stylesheet" href="assets/css/colors.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <link rel="stylesheet" href="assets/css/tools.css">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

    <div class="window">

        <div class="history-backdrop"></div>

        <!-- ================= CALCULATOR SCREEN ================= -->

        <div id="calcScreen" class="screen active">

            <header class="title-bar">

                <div class="title-left">
                    <button type="button" class="mobile-history-toggle" aria-label="Show history">
                        <i class="fa-regular fa-clock"></i>
                    </button>
                    <button type="button" class="mode-toggle-btn" aria-label="Switch to Scientific mode">
                        <i class="fa-solid fa-square-root-variable"></i>
                    </button>
                    <i class="fa-solid fa-calculator"></i>
                    <span>Calculator</span>
                </div>

                <div class="title-right">
                    <button type="button" id="openCurrencyScreen" aria-label="Currency calculator"><i
                            class="fa-solid fa-money-bill-transfer"></i></button>
                    <button type="button" id="openAgeScreen" aria-label="Age calculator"><i
                            class="fa-solid fa-cake-candles"></i></button>
                </div>

            </header>

            <!-- ================= Main ================= -->

            <main class="calculator">

                <!-- ================= History ================= -->

                <section class="history">

                    <button type="button" class="history-close" aria-label="Close history">
                        <i class="fa-solid fa-xmark"></i>
                    </button>

                    <div class="history-tabs">

                        <button type="button" class="active">
                            <i class="fa-regular fa-clock"></i>
                            History
                        </button>

                        <!-- <button type="button">
                        <i class="fa-regular fa-hard-drive"></i>
                        Memory
                    </button> -->

                    </div>

                    <h3>Today</h3>

                    <div class="history-list">
                        <!-- populated dynamically by app.js (renderHistory) -->

                    </div>

                    <button type="button" class="clear-history">
                        <i class="fa-regular fa-trash-can"></i>
                        Clear History
                    </button>

                </section>

                <!-- ================= Right Side ================= -->

                <section class="right-panel">

                    <!-- Display -->

                    <section class="display">

                        <div class="expression"></div>

                        <div class="result" id="result">0</div>

                    </section>

                    <!-- Buttons -->

                    <section class="buttons">

                        <!-- Row 1 -->

                        <button type="button" class="sci-only">(</button>
                        <button type="button" class="sci-only">)</button>
                        <button type="button" class="sci-only">mc</button>
                        <button type="button" class="sci-only">m+</button>
                        <button type="button" class="sci-only">m−</button>
                        <button type="button" class="sci-only">mr</button>
                        <button type="button" class="ac-btn">AC</button>
                        <button class="backspace-btn" aria-label="Backspace">
                            <i class="fa-solid fa-delete-left"></i>
                        </button>
                        <button type="button">+/-</button>
                        <button type="button" class="operator">÷</button>

                        <!-- Row 2 -->

                        <button type="button" class="sci-only">2nd</button>
                        <button type="button" class="sci-only">x²</button>
                        <button type="button" class="sci-only">x³</button>
                        <button type="button" class="sci-only">xʸ</button>
                        <button type="button" class="sci-only">eˣ</button>
                        <button type="button" class="sci-only">10ˣ</button>
                        <button type="button">7</button>
                        <button type="button">8</button>
                        <button type="button">9</button>
                        <button type="button" class="operator">×</button>

                        <!-- Row 3 -->

                        <button type="button" class="sci-only">1/x</button>
                        <button type="button" class="sci-only">²√x</button>
                        <button type="button" class="sci-only">³√x</button>
                        <button type="button" class="sci-only">ʸ√x</button>
                        <button type="button" class="sci-only">ln</button>
                        <button type="button" class="sci-only">log</button>
                        <button type="button">4</button>
                        <button type="button">5</button>
                        <button type="button">6</button>
                        <button type="button" class="operator">−</button>

                        <!-- Row 4 -->

                        <button type="button" class="sci-only">x!</button>
                        <button type="button" class="sci-only">sin</button>
                        <button type="button" class="sci-only">cos</button>
                        <button type="button" class="sci-only">tan</button>
                        <button type="button" class="sci-only">e</button>
                        <button type="button" class="sci-only">EE</button>
                        <button type="button">1</button>
                        <button type="button">2</button>
                        <button type="button">3</button>
                        <button type="button" class="operator">+</button>

                        <!-- Row 5 -->

                        <button type="button" id="inlineModeToggle" class="sci-only" aria-label="Switch to Basic mode">
                            <i class="fa-solid fa-calculator"></i>
                        </button>

                        <button type="button" class="sci-only">sinh</button>
                        <button type="button" class="sci-only">cosh</button>
                        <button type="button" class="sci-only">tanh</button>
                        <button type="button" class="sci-only">π</button>
                        <button type="button" class="sci-only">Rad</button>
                        <button type="button">%</button>
                        <button type="button">0</button>
                        <button type="button">.</button>
                        <button type="button" class="operator">=</button>

                    </section>

                </section>

            </main>

        </div>

        <!-- ================= AGE CALCULATOR SCREEN ================= -->

        <div id="ageScreen" class="screen tool-screen">

            <header class="title-bar">
                <div class="title-left">
                    <i class="fa-solid fa-cake-candles"></i>
                    <span>Age Calculator</span>
                </div>
                <div class="title-right">
                    <button type="button" data-back aria-label="Back to calculator">
                        <i class="fa-solid fa-arrow-left"></i>
                    </button>
                </div>
            </header>

            <main class="tool-content">
                <div class="tool-card">

                    <label class="tool-label" for="ageBirthDate">Date of birth</label>
                    <input type="date" id="ageBirthDate" class="tool-input">

                    <label class="tool-label" for="ageAsOfDate">Calculate age as of</label>
                    <input type="date" id="ageAsOfDate" class="tool-input">

                    <button type="button" id="ageCalculateBtn" class="tool-primary-btn">Calculate Age</button>

                    <div id="ageError" class="tool-error" hidden></div>

                    <div id="ageResult" class="tool-result" hidden>
                        <div class="tool-result-main">
                            <span id="ageYears">0</span> years
                            <span id="ageMonths">0</span> months
                            <span id="ageDays">0</span> days
                        </div>
                        <div class="age-breakdown">
                            <div>or <span id="ageTotalMonths">0</span> months <span id="ageTotalMonthsDays">0</span>
                                days</div>
                            <div>or <span id="ageTotalWeeks">0</span> weeks <span id="ageTotalWeeksDays">0</span> days
                            </div>
                            <div>or <span id="ageTotalDays">0</span> days</div>
                            <div>or <span id="ageTotalHours">0</span> hours</div>
                            <div>or <span id="ageTotalMinutes">0</span> minutes</div>
                            <div>or <span id="ageTotalSeconds">0</span> seconds</div>
                        </div>
                    </div>

                </div>
            </main>

        </div>

        <!-- ================= CURRENCY CALCULATOR SCREEN ================= -->

        <div id="currencyScreen" class="screen tool-screen">

            <header class="title-bar">
                <div class="title-left">
                    <i class="fa-solid fa-money-bill-transfer"></i>
                    <span>Currency Calculator</span>
                </div>
                <div class="title-right">
                    <button type="button" data-back aria-label="Back to calculator">
                        <i class="fa-solid fa-arrow-left"></i>
                    </button>
                </div>
            </header>

            <main class="tool-content">
                <div class="tool-card">

                    <label class="tool-label" for="currencyAmount">Amount</label>
                    <input type="number" id="currencyAmount" class="tool-input" value="1" min="0" step="any">

                    <div class="currency-row">
                        <div class="currency-field">
                            <label class="tool-label" for="currencyFrom">From</label>
                            <select id="currencyFrom" class="tool-select"></select>
                        </div>

                        <button type="button" id="currencySwapBtn" class="currency-swap-btn"
                            aria-label="Swap currencies">
                            <i class="fa-solid fa-arrow-right-arrow-left"></i>
                        </button>

                        <div class="currency-field">
                            <label class="tool-label" for="currencyTo">To</label>
                            <select id="currencyTo" class="tool-select"></select>
                        </div>
                    </div>

                    <button type="button" id="currencyConvertBtn" class="tool-primary-btn">Convert</button>

                    <div id="currencyLoading" class="tool-loading" hidden>Fetching latest rates…</div>
                    <div id="currencyError" class="tool-error" hidden></div>

                    <div id="currencyResult" class="tool-result" hidden>
                        <div class="tool-result-main" id="currencyResultMain"></div>
                        <div class="tool-result-sub" id="currencyResultSub"></div>
                    </div>

                </div>
            </main>

        </div>

    </div>

    <script src="assets/js/calculator-engine.js"></script>
    <script src="assets/js/display.js"></script>
    <script src="assets/js/ui-controls.js"></script>
    <script src="assets/js/keyboard.js"></script>
    <script src="assets/js/mobile.js"></script>
    <script src="assets/js/tools.js"></script>
    <script src="assets/js/app.js"></script>

</body>

</html>
